<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elendil - Legal</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1218;
      --card: #121c24;
      --text: #eef4f6;
      --muted: #aab7bf;
      --accent: #c59b24;
      --border: #24323d;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.2;
      margin: 0 0 16px;
    }
    p {
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 700;
    }
    ul {
      padding-left: 20px;
    }
    li {
      margin: 12px 0;
      color: var(--muted);
    }
    .eyebrow {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      font-size: .8rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <p class="eyebrow">Elendil</p>
      <h1>Informacion legal</h1>
      <p>
        Paginas publicas de soporte para la ficha de Google Play de Elendil.
      </p>
      <ul>
        <li><a href="./privacy-policy.html">Politica de privacidad</a></li>
        <li><a href="./data-deletion.html">Eliminacion de datos</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
